<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | NICHY.</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #B18B8E;
            --charcoal: #4A3A3A;
            --soft-cream: #FCFAFA;
            --border: #ece2e3;
        }

        body { 
            background-color: var(--soft-cream); 
            font-family: 'Poppins', sans-serif;
            color: var(--charcoal);
        }

        .checkout-container {
            max-width: 1100px;
            margin: 100px auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 50px;
        }

        /* --- FORM STYLING --- */
        .checkout-form h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .form-section {
            background: white;
            padding: 30px;
            border-radius: 4px;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        .form-section h3 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: #888;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* --- PAYMENT OPTIONS --- */
        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .method-card {
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .method-card:hover {
            border-color: var(--primary);
        }

        /* --- ORDER SUMMARY SIDEBAR --- */
        .order-summary {
            background: #fff;
            padding: 30px;
            border-radius: 4px;
            border: 1px solid var(--border);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .summary-total {
            border-top: 1px solid var(--border);
            padding-top: 15px;
            margin-top: 15px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .btn-pay {
            width: 100%;
            padding: 18px;
            background: var(--charcoal);
            color: white;
            border: none;
            margin-top: 25px;
            cursor: pointer;
            letter-spacing: 2px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-pay:hover {
            background: var(--primary);
        }

        @media (max-width: 850px) {
            .checkout-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><h1>NICHY</h1></div>
        <ul class="nav-links">
            <li><a href="katalog.html">Back to Shop</a></li>
        </ul>
    </nav>

    <div class="checkout-container">
        <div class="checkout-form">
            <h2>Checkout</h2>
            
            <div class="form-section">
                <h3>Contact Information</h3>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="email@contoh.com">
                </div>
            </div>

            <div class="form-section">
                <h3>Shipping Address</h3>
                <div class="grid-2">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text">
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" placeholder="Nama jalan, nomor rumah, kecamatan">
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text">
                    </div>
                    <div class="form-group">
                        <label>Postal Code</label>
                        <input type="text">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Payment Method</h3>
                <div class="payment-methods">
                    <label class="method-card">
                        <input type="radio" name="payment" checked>
                        <span>Bank Transfer (Manual Verification)</span>
                    </label>
                    <label class="method-card">
                        <input type="radio" name="payment">
                        <span>E-Wallet (OVO / GoPay / ShopeePay)</span>
                    </label>
                    <label class="method-card">
                        <input type="radio" name="payment">
                        <span>Credit Card</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="order-summary">
            <h3 style="font-family: 'Playfair Display'; margin-bottom: 20px;">Your Order</h3>
            
            <div class="summary-item">
                <span>Rose Petal Silk (x1)</span>
                <span>Rp 89.000</span>
            </div>
            <div class="summary-item">
                <span>Vanilla Calm (x1)</span>
                <span>Rp 99.000</span>
            </div>
            
            <div style="border-top: 1px solid var(--border); margin: 15px 0;"></div>
            
            <div class="summary-item">
                <span>Subtotal</span>
                <span>Rp 188.000</span>
            </div>
            <div class="summary-item">
                <span>Shipping</span>
                <span>Rp 15.000</span>
            </div>
            
            <div class="summary-total summary-item">
                <span>Total Amount</span>
                <span style="color: var(--primary);">Rp 203.000</span>
            </div>

            <button class="btn-pay" onclick="alert('Pesanan Diterima! Terima kasih telah berbelanja di NICHY.')">PLACE ORDER</button>
            
            <p style="font-size: 0.7rem; color: #aaa; text-align: center; margin-top: 15px;">
                By clicking "Place Order", you agree to our Terms and Conditions.
            </p>
        </div>
    </div>

</body>
</html>
